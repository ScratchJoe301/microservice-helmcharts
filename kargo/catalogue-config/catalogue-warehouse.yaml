apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: catalogue-warehouse
  namespace: craftista
spec:
  freightCreationPolicy: Automatic
  interval: 1440m
  subscriptions:
    - image:
        repoURL: docker.io/ScratchJoe301/microservice-catalogue
        imageSelectionStrategy: SemVer
        discoveryLimit: 20